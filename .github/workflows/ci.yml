name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: self-hosted
    environment: production
    env:
      BACKEND_APP_NAME: backend
      BACKEND_ENV_FILE: /etc/debatehub/backend.env
      FRONTEND_DEPLOY_PATH: /var/www/debatehub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm run install-all

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Validate deployment path
        run: |
          if [ -z "$FRONTEND_DEPLOY_PATH" ] || [ "$FRONTEND_DEPLOY_PATH" = "/" ]; then
            echo "::error::FRONTEND_DEPLOY_PATH must be a non-root deployment directory"
            exit 1
          fi

      - name: Prepare backend environment file
        env:
          SECRET_MONGO_URI: ${{ secrets.MONGO_URI }}
          SECRET_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGO_DB_NAME: ${{ vars.MONGO_DB_NAME || 'debateHub' }}
          PORT: ${{ vars.PORT || '5001' }}
        run: |
          if [ -n "$SECRET_MONGO_URI" ] && [ -n "$SECRET_JWT_SECRET" ]; then
            {
              printf 'MONGO_URI=%s\n' "$SECRET_MONGO_URI"
              printf 'MONGO_DB_NAME=%s\n' "$MONGO_DB_NAME"
              printf 'JWT_SECRET=%s\n' "$SECRET_JWT_SECRET"
              printf 'PORT=%s\n' "$PORT"
            } > backend/.env
          elif [ -f "$BACKEND_ENV_FILE" ]; then
            cp "$BACKEND_ENV_FILE" backend/.env
          elif [ -n "${MONGO_URI:-}" ] && [ -n "${JWT_SECRET:-}" ]; then
            {
              printf 'MONGO_URI=%s\n' "$MONGO_URI"
              printf 'MONGO_DB_NAME=%s\n' "${MONGO_DB_NAME:-debateHub}"
              printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
              printf 'PORT=%s\n' "${PORT:-5001}"
            } > backend/.env
          else
            echo "::error::Backend environment is missing. Add MONGO_URI and JWT_SECRET as GitHub Environment secrets, set runner environment variables, or create $BACKEND_ENV_FILE on the EC2 server."
            exit 1
          fi

      - name: Deploy frontend
        run: |
          sudo mkdir -p "$FRONTEND_DEPLOY_PATH"
          sudo rm -rf "$FRONTEND_DEPLOY_PATH"/*
          sudo cp -R frontend/build/. "$FRONTEND_DEPLOY_PATH"/

      - name: Restart backend
        run: |
          if ! command -v pm2 >/dev/null 2>&1; then
            npm install -g pm2
          fi

          cd backend
          if pm2 describe "$BACKEND_APP_NAME" >/dev/null 2>&1; then
            pm2 restart "$BACKEND_APP_NAME" --update-env
          else
            pm2 start server.js --name "$BACKEND_APP_NAME" --update-env
          fi
          pm2 save
